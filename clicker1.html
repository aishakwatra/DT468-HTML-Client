<!DOCTYPE html>
<html>

<head>
    <title>WebSocket Counter</title>
</head>

<body>

<h1>Real-Time Counter</h1>

<h3>Status: <span id="status">Connecting...</span></h3>

<h2 id="counter">0</h2>

<button id="clickBtn" onclick="sendClick()" disabled>Click Me</button>

<button onclick="connect()">Retry Connection</button>

<script>

let ws = null

function setStatus(text) {
    document.getElementById("status").innerText = text
}

function connect() {

    setStatus("Connecting...")
    document.getElementById("clickBtn").disabled = true

    ws = new WebSocket("wss://clickcounterserver.onrender.com")

    ws.onopen = () => {
        setStatus("Connected")
        document.getElementById("clickBtn").disabled = false
    }

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data)

        if (msg.type === "counter") {
            document.getElementById("counter").innerText = msg.value
        }
    }

    ws.onerror = () => {
        setStatus("Connection error")
        document.getElementById("clickBtn").disabled = true
    }

    ws.onclose = () => {
        setStatus("Disconnected (server may be sleeping)")
        document.getElementById("clickBtn").disabled = true
    }
}

function sendClick() {

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Not connected to server")
        return
    }

    ws.send(JSON.stringify({
        type: "click"
    }))
}

connect()

</script>

</body>
</html>
